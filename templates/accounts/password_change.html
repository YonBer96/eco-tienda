{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card panel-card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Cambiar contraseña</h1>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-success">Actualizar contraseña</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
