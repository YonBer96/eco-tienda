{% extends 'base.html' %}
{% block title %}Acceso | {{ APP_DISPLAY_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card panel-card shadow-sm border-0">
      <div class="card-body p-4">
        <h1 class="h3 mb-3 text-center">Acceso a {{ APP_DISPLAY_NAME }}</h1>
        <p class="text-muted text-center">Solo el administrador puede dar de alta usuarios.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-success w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
