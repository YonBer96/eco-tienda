{% extends "base.html" %}

{% block content %}

<div class="page-hero">
    <div>
        <h1>{{ titulo }}</h1>

        <p class="text-muted">
            Formulario de gestión de proveedores.
        </p>
    </div>
</div>

<div class="card">
    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <div class="row g-3">

                {% for field in form %}

                <div class="col-md-6">

                    <label class="form-label">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                    <div class="text-danger small mt-1">
                        {{ field.errors }}
                    </div>
                    {% endif %}

                </div>

                {% endfor %}

            </div>

            <div class="d-flex gap-2 mt-4">

                <button type="submit"
                        class="btn btn-success">
                    Guardar proveedor
                </button>

                <a href="{% url 'proveedor_list' %}"
                   class="btn btn-outline-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>
</div>

{% endblock %}
